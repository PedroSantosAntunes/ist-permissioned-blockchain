syntax = "proto3";

package pt.tecnico.blockchainist.contract;

import "common.proto";

// The following option causes top-level messages, enums, and services to be
// defined at the package level, rather than inside an outer class named after
// the .proto file.
option java_multiple_files = true;

// BroadcastRequest is sent when the node received a transaction request from a client and need to send that request to sequencer
message BroadcastRequest {
  Transaction transaction = 1;
}

message BroadcastResponse {
  int32 sequence_number = 1;
}


// DeliverBlockRequest is sent when the node needs to fetch transactions from the sequencer
message DeliverTransactionRequest {
  int32 block_number = 1;
}

message DeliverBlockResponse {
  Block block = 1
}

service SequencerService {
  rpc Broadcast(BroadcastRequest) returns (BroadcastResponse);
  rpc DeliverBlock(DeliverBlockRequest) returns (DeliverBlockResponse)
}
