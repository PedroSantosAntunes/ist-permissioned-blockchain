syntax = "proto3";

package pt.tecnico.blockchainist.contract;

// The following option causes top-level messages, enums, and services to be
// defined at the package level, rather than inside an outer class named after
// the .proto file.
option java_multiple_files = true;

// Used to ensure uniform responses.
enum InternalResponseStatus {
  OK = 0;
  BAD_USER_FORMAT = 1;
  BAD_WALLET_FORMAT = 2;
  WALLET_ALREADY_EXISTS = 3;
  WALLET_NOT_FOUND = 4;
  USER_NOT_FOUND = 5;
  NOT_AUTHORIZED = 6;
  REMAINING_BALANCE = 7;
  INSUFFICIENT_BALANCE = 8;
  NEGATIVE_AMOUNT = 9;
}

message CreateWalletRequest {
  string userId = 1;
  string walletId = 2;
}

message DeleteWalletRequest {
  string userId = 1;
  string walletId = 2;
}

message TransferRequest {
  string src_userId = 1;
  string src_walletId = 2;
  string dst_walletId = 3;
  uint64 value = 4;
}

message Transaction {
  oneof operation {
    CreateWalletRequest create_wallet = 1;
    DeleteWalletRequest delete_wallet = 2;
    TransferRequest transfer = 3;
  }
}
